version: '3.8'

services:
  # The Database (Postgres + pgvector)
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 24o93n51e34R179?
      POSTGRES_DB: curatorial_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # The Message Broker (Redis)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: